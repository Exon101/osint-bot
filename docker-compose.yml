version: '3.8'

services:
  osint-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osint-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - bot-data:/app
    healthcheck:
      test: ["CMD", "python", "-c", "from config import config; print('OK')"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 1.0

volumes:
  bot-data:
    driver: local
